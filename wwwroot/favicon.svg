<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <circle cx="32" cy="32" r="32" fill="#0a0f0d"/>
  <!-- Quatro folhas posicionadas em cruz ao redor do centro -->
  <ellipse cx="32" cy="18" rx="9" ry="12" fill="#2fd45a" transform="rotate(0,32,32)"/>
  <ellipse cx="32" cy="18" rx="9" ry="12" fill="#209b3e" transform="rotate(90,32,32)"/>
  <ellipse cx="32" cy="18" rx="9" ry="12" fill="#2fd45a" transform="rotate(180,32,32)"/>
  <ellipse cx="32" cy="18" rx="9" ry="12" fill="#209b3e" transform="rotate(270,32,32)"/>
  <!-- Caule -->
  <line x1="32" y1="36" x2="38" y2="52" stroke="#0d6b2e" stroke-width="3" stroke-linecap="round"/>
</svg>
