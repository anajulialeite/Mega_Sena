<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Gerador de números da Mega Sena - Sorteie 6 números aleatórios de 1 a 60">
    <title>Mega Sena - Gerador de Números</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="estilo.css">
</head>
<body>
    <div class="container">
        <header class="cabecalho">
            <div class="logo-trevo">🍀</div>
            <h1>Mega Sena</h1>
            <p class="subtitulo">Gerador de Números da Sorte</p>
        </header>

        <main class="area-sorteio">
            <div id="globo-bolas" class="globo-bolas">
                <div class="bola-placeholder"></div>
                <div class="bola-placeholder"></div>
                <div class="bola-placeholder"></div>
                <div class="bola-placeholder"></div>
                <div class="bola-placeholder"></div>
                <div class="bola-placeholder"></div>
            </div>

            <button id="botao-sortear" class="botao-sortear" onclick="realizarSorteio()">
                <span class="botao-icone">🎱</span>
                <span>Sortear</span>
            </button>
        </main>

        <footer class="rodape">
            <p>Números gerados aleatoriamente · Apenas para diversão</p>
        </footer>
    </div>

    <div id="confetes" class="confetes"></div>

    <script src="script.js"></script>
</body>
</html>
